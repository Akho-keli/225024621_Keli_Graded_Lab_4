<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Text</title>
    <link rel="stylesheet" href="Question_1.css">
</head>
<body>
    <div class="column">
        <h2>Expected output</h2>
        <textarea id="expected" rows="10" cols="50"></textarea>
    </div>

    <div class="column">
        <h2>Your Actual output</h2>
        <textarea id="actual" rows="10" cols="50"></textarea>
      
    <div id="compare-area">
        <button id="compare-btn">Compare</button>
        <button id="clear-btn">Clear</button>
    </div>

    <ol id="result"></ol>

    <script src="Question_1.js"></script>
</body>

</html>
